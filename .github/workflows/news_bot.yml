name: Haber Botu Otomasyonu

on:
  schedule:
    # Günde 3 kere çalışır
    # Türkiye saati ile (UTC+3) 09:00, 15:00 ve 21:00'a denk gelir.
    - cron: '0 6,12,18 * * *'
  workflow_dispatch: # İstediğin zaman manuel çalıştırmak için buton ekler 🔘

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - name: Kodları Çek
        uses: actions/checkout@v3

      - name: Python Kurulumu
        uses: actions/setup-python@v4
        with:
          python-version: '3.13'

      - name: Hafiza Cache (Restore/Save)
        id: sent-memory-cache
        uses: actions/cache@v4
        with:
          path: sent_embeddings.json
          key: sent-embeddings-${{ runner.os }}-${{ github.run_id }}
          restore-keys: |
            sent-embeddings-${{ runner.os }}-

      - name: Kütüphaneleri Yükle
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Botu Çalıştır 
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_TOKEN }} 
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }} 
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }} # <-- İŞTE BUNU EKLEDİK DOSTUM
        run: python agent.py
